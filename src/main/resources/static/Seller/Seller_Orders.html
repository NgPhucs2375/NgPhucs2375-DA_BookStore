<!DOCTYPE html>

        tailwind.config = {
            theme: {

        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-brown/10 text-brand-dark rounded-lg font-bold shadow-sm">

        <a href="Inventory_Management.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition font-medium">

<main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-20 bg-white border-b border-brand-border flex items-center justify-between px-8 z-10 shadow-sm">
        <h1 class="text-xl font-bold">Danh sách đơn hàng</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-slate-500">Nhà sách Tuổi Trẻ</span>
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-white font-black text-sm">NS</div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8 space-y-6">
        <div class="flex gap-1 border-b border-brand-border">
            <button class="px-5 py-3 border-b-2 border-brand-orange text-brand-orange font-bold text-sm">Chờ xác nhận (5)</button>
            <button class="px-5 py-3 border-b-2 border-transparent text-slate-500 hover:text-brand-dark font-medium text-sm transition">Đang giao (12)</button>
            <button class="px-5 py-3 border-b-2 border-transparent text-slate-500 hover:text-brand-dark font-medium text-sm transition">Đã hoàn thành</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-brand-border overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-500 font-bold uppercase text-[10px] tracking-widest border-b border-brand-border">

                        <th class="px-6 py-5">Mã đơn</th>
                        <th class="px-6 py-5">Khách hàng</th>
                        <th class="px-6 py-5">Sản phẩm chính</th>
                        <th class="px-6 py-5">Tổng tiền</th>
                        <th class="px-6 py-5 text-right">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-brand-border">
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-5 font-bold text-brand-orange">#BK-2026-091</td>
                        <td class="px-6 py-5">
                            <p class="font-bold">Vũ Thiên Trường</p>
                            <p class="text-xs text-slate-400">090xxxx123</p>
                        </td>
                        <td class="px-6 py-5 text-slate-600 font-medium italic">Tâm lý học đám đông (x1)</td>
                        <td class="px-6 py-5 font-black text-lg">85.000đ</td>
                        <td class="px-6 py-5 text-right space-x-2">
                            <button class="bg-brand-orange text-white px-4 py-2 rounded-lg text-xs font-bold shadow hover:bg-orange-700 transition active:scale-95">Xác nhận</button>
                            <button class="bg-white border border-brand-border text-slate-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-100 transition">Chi tiết</button>
                        </td>
                    </tr>
                    </tbody>
            </table>
