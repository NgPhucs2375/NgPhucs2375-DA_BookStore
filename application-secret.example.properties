# Copy this file to application-secret.properties and fill your local secrets.
# This file is safe to commit because it does not contain real values.

google.gemini.api-key.local=YOUR_GEMINI_API_KEY

# SMTP config for OTP email sending
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
MAIL_USERNAME=your_email@gmail.com
