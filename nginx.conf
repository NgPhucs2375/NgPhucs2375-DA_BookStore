worker_processes  1;

events { worker_connections  1024; }

http {
  # DNS resolver nội bộ của Docker để Nginx có thể nhận diện tên container
  resolver 127.0.0.11 ipv6=off valid=10s;

  # KHAI BÁO VÙNG NHỚ CHỐNG DDOS
  # Giới hạn 1 IP chỉ được gửi tối đa 10 request mỗi giây
  limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

  upstream web_backend {
    # Khai báo 3 server Bookom, nếu lỗi 2 lần liên tiếp sẽ bị cấm 5 giây
    server bookom-app-1:8080 max_fails=2 fail_timeout=5s weight=1;
    server bookom-app-2:8080 max_fails=2 fail_timeout=5s weight=1;
    server bookom-app-3:8080 max_fails=2 fail_timeout=5s weight=1;

    # Giữ lại các kết nối đang mở để tăng tốc độ
    keepalive 32;
  }

  server {
    listen 80;

    # KÍCH HOẠT LUẬT BẢO VỆ CHỐNG DDOS
    # Cho phép dồn cục tối đa 20 request cùng lúc, vượt quá sẽ bị chặn ngay
    limit_req zone=mylimit burst=20 nodelay;

    location / {
      proxy_pass http://web_backend;

      # Đẩy thông tin IP thật của khách hàng xuống cho Spring Boot xử lý
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";

      proxy_http_version 1.1;

      # CƠ CHẾ FAILOVER TỰ ĐỘNG CHUYỂN TRẠM
      # Nếu backend hiện tại báo lỗi 502, 503... Nginx sẽ tự đẩy khách sang backend khác
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
      proxy_next_upstream_timeout 3s;

      # Giới hạn thời gian chờ, tránh bị treo kết nối
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
      proxy_send_timeout 10s;
    }
  }
}