<style>
    /* CSS Sidebar logic - Sửa đè vào phần style của bạn */
    aside.sidebar {
        width: 18rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Ghi đè Tailwind w-72 khi có class .collapsed */
    aside.sidebar.collapsed {
        width: 5rem !important;
        px: 0.75rem !important; /* Thu nhỏ padding */
    }

    /* Ẩn chữ và label khi thu gọn */
    aside.sidebar.collapsed .menu-label,
    aside.sidebar.collapsed .logo-text-display {
        display: none !important;
    }

    /* Căn giữa các icon khi thu gọn */
    aside.sidebar.collapsed nav a {
        justify-content: center !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
    }

    /* Xử lý padding header sidebar khi thu gọn */
    aside.sidebar.collapsed .sidebar-header {
        padding-left: 0 !important;
        padding-right: 0 !important;
        justify-content: center !important;
    }

    aside.sidebar.collapsed #sidebarToggle {
        margin-left: 0 !important;
    }
</style>

<aside th:fragment="sidebar(activeMenu)" id="mainSidebar" class="sidebar fixed left-0 top-0 z-50 flex h-screen w-72 flex-col overflow-y-auto border-r bg-white px-5">
    <div class="sidebar-header h-20 px-6 flex items-center border-b transition-all">
        <a th:href="@{/admin}" class="flex items-center gap-2">
            <img th:src="@{/tailadmin-logo.svg}" alt="BOOKOM Admin Logo" class="h-8 w-auto" />
            <span class="logo-text-display font-bold text-gray-800">BOOKOM ADMIN</span>
        </a>
        <button id="sidebarToggle" aria-label="Toggle sidebar" class="ml-auto p-2 text-gray-500 hover:text-gray-700 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <nav class="p-4 space-y-2 text-sm font-extrabold tracking-wide">
        <a th:href="@{/admin}" class="flex items-center gap-3 rounded-lg px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-dashboard'} ? ' bg-brand-50 text-brand-500 shadow-sm' : ' text-gray-700 hover:bg-gray-100'">
            <span class="h-2 w-2 rounded-full shrink-0" th:classappend="${activeMenu == 'admin-dashboard'} ? ' bg-brand-500' : ' bg-gray-300'"></span>
            <span class="menu-label">Tong quan san</span>
        </a>

        <a th:href="@{/admin/users}" class="flex items-center gap-3 rounded-lg px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-users'} ? ' bg-brand-50 text-brand-500 shadow-sm' : ' text-gray-700 hover:bg-gray-100'">
            <span class="h-2 w-2 rounded-full shrink-0" th:classappend="${activeMenu == 'admin-users'} ? ' bg-brand-500' : ' bg-gray-300'"></span>
            <span class="menu-label">Nguoi dung</span>
        </a>

        <a th:href="@{/admin/shops}" class="flex items-center gap-3 rounded-lg px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-shops'} ? ' bg-brand-50 text-brand-500 shadow-sm' : ' text-gray-700 hover:bg-gray-100'">
            <span class="h-2 w-2 rounded-full shrink-0" th:classappend="${activeMenu == 'admin-shops'} ? ' bg-brand-500' : ' bg-gray-300'"></span>
            <span class="menu-label">Gian hang</span>
        </a>

        <a th:href="@{/admin/books}" class="flex items-center gap-3 rounded-lg px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-books'} ? ' bg-brand-50 text-brand-500 shadow-sm' : ' text-gray-700 hover:bg-gray-100'">
            <span class="h-2 w-2 rounded-full shrink-0" th:classappend="${activeMenu == 'admin-books'} ? ' bg-brand-500' : ' bg-gray-300'"></span>
            <span class="menu-label">Kiem duyet sach</span>
        </a>
    </nav>

    <div class="mt-auto p-4 text-center menu-label">
        <p class="text-xs text-gray-500">TailAdmin - integrated</p>
        <a href="https://tailadmin.com" target="_blank" class="inline-block mt-2 text-sm text-white bg-indigo-600 px-3 py-1 rounded">Learn more</a>
    </div>

    <script th:inline="javascript">
        (function () {
            function initSidebar() {
                const btn = document.getElementById('sidebarToggle');
                const sidebar = document.getElementById('mainSidebar');
                const collapsedClass = 'collapsed';

                if (!btn || !sidebar) return;

                // Load trạng thái từ localStorage
                const persisted = localStorage.getItem('sidebarCollapsed');
                if (persisted === 'true') {
                    sidebar.classList.add(collapsedClass);
                }

                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    const isCollapsed = sidebar.classList.toggle(collapsedClass);
                    // Lưu trạng thái
                    localStorage.setItem('sidebarCollapsed', isCollapsed);
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSidebar);
            } else {
                initSidebar();
            }
        })();
    </script>
</aside>

<header th:fragment="header(pageTitle, pageSubtitle)" class="h-20 bg-white border-b border-[#E5CBB5] px-6 md:px-8 flex items-center justify-between">
    <div>
        <h1 class="text-xl md:text-2xl font-black text-[#5D4037]" th:text="${pageTitle}">Tong quan san</h1>
        <p class="text-xs md:text-sm text-[#5D4037]/70 font-bold" th:text="${pageSubtitle}">Dieu huong bang Thymeleaf Fragments</p>
    </div>
    <div class="flex items-center gap-3">
        <a th:href="@{/}" class="hidden sm:inline-flex text-sm font-black text-[#5D4037]/70 hover:text-[#5D4037]">Ve trang mua sam</a>
        <div class="h-10 w-10 rounded-full bg-[#D19C74] text-white flex items-center justify-center text-xs font-black shadow-sm">AD</div>
    </div>
</header>
