<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/panel_head :: head('BOOKOM SELLER - Don hang', false)}"></head>
<body class="font-sans bg-[#fbfaf8] text-[#5D4037]">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/seller_layout :: sidebar(${activeMenu})}"></div>
    <div class="flex-1 min-w-0">
        <div th:replace="~{fragments/seller_layout :: header(${pageTitle}, ${pageSubtitle})}"></div>
        <main class="p-4 md:p-8 space-y-6">
            <section class="rounded-xl border border-[#E5CBB5] bg-white p-4 grid grid-cols-1 md:grid-cols-2 gap-3">
                <input id="orders-q" class="rounded-lg border border-[#E5CBB5] px-3 py-2 font-bold" placeholder="Tim ma don/khach/san pham">
                <select id="orders-status" class="rounded-lg border border-[#E5CBB5] px-3 py-2 font-bold"><option value="all">Tat ca trang thai</option><option>Cho xac nhan</option><option>Dang giao</option><option>Hoan tat</option></select>
            </section>
            <section class="rounded-xl border border-[#E5CBB5] bg-white overflow-hidden">
                <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead class="bg-[#FAF5E8] text-[#5D4037]/70"><tr><th class="px-4 py-3 font-black">Ma don</th><th class="px-4 py-3 font-black">Khach</th><th class="px-4 py-3 font-black">San pham</th><th class="px-4 py-3 font-black">Gia tri</th><th class="px-4 py-3 font-black">Trang thai</th><th class="px-4 py-3 font-black text-right">Chi tiet</th></tr></thead><tbody id="seller-orders-body" class="divide-y divide-[#E5CBB5]"></tbody></table></div>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/panel-data.js}"></script>
<script th:src="@{/js/api-service.js}"></script>
<script th:src="@{/js/order-details-integration.js}"></script>
<script>
// Load seller orders with new API integration
if (typeof loadSellerOrders === 'function') {
    loadSellerOrders();
} else {
    BookomPanelData.initSellerOrders();
}
</script>
</body>
</html>
