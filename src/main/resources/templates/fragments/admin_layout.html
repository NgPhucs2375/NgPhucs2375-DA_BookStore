<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activeMenu)" class="hidden md:flex md:w-72 md:flex-col bg-[#5D4037] border-r border-black/10">
    <div class="h-20 px-6 flex items-center border-b border-white/10">
        <a th:href="@{/admin}" class="text-2xl font-black tracking-tight text-white">
            BOOKOM <span class="text-[#F8D9C0] text-sm align-middle">ADMIN</span>
        </a>
    </div>
    <nav class="p-4 space-y-2 text-sm font-extrabold tracking-wide">
        <a th:href="@{/admin}" class="flex items-center gap-3 rounded-xl px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-dashboard'} ? ' bg-[#D19C74] text-white shadow-md' : ' text-[#FAF5E8]/90 hover:bg-white/10 hover:text-white'">
            <span class="h-2 w-2 rounded-full" th:classappend="${activeMenu == 'admin-dashboard'} ? ' bg-white' : ' bg-[#FAF5E8]/50'"></span>
            Tong quan san
        </a>
        <a th:href="@{/admin/users}" class="flex items-center gap-3 rounded-xl px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-users'} ? ' bg-[#D19C74] text-white shadow-md' : ' text-[#FAF5E8]/90 hover:bg-white/10 hover:text-white'">
            <span class="h-2 w-2 rounded-full" th:classappend="${activeMenu == 'admin-users'} ? ' bg-white' : ' bg-[#FAF5E8]/50'"></span>
            Nguoi dung
        </a>
        <a th:href="@{/admin/shops}" class="flex items-center gap-3 rounded-xl px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-shops'} ? ' bg-[#D19C74] text-white shadow-md' : ' text-[#FAF5E8]/90 hover:bg-white/10 hover:text-white'">
            <span class="h-2 w-2 rounded-full" th:classappend="${activeMenu == 'admin-shops'} ? ' bg-white' : ' bg-[#FAF5E8]/50'"></span>
            Gian hang
        </a>
        <a th:href="@{/admin/books}" class="flex items-center gap-3 rounded-xl px-4 py-3 transition"
           th:classappend="${activeMenu == 'admin-books'} ? ' bg-[#D19C74] text-white shadow-md' : ' text-[#FAF5E8]/90 hover:bg-white/10 hover:text-white'">
            <span class="h-2 w-2 rounded-full" th:classappend="${activeMenu == 'admin-books'} ? ' bg-white' : ' bg-[#FAF5E8]/50'"></span>
            Kiem duyet sach
        </a>
    </nav>
</aside>

<header th:fragment="header(pageTitle, pageSubtitle)" class="h-20 bg-white border-b border-[#E5CBB5] px-6 md:px-8 flex items-center justify-between">
    <div>
        <h1 class="text-xl md:text-2xl font-black text-[#5D4037]" th:text="${pageTitle}">Tong quan san</h1>
        <p class="text-xs md:text-sm text-[#5D4037]/70 font-bold" th:text="${pageSubtitle}">Dieu huong bang Thymeleaf Fragments</p>
    </div>
    <div class="flex items-center gap-3">
        <a th:href="@{/}" class="hidden sm:inline-flex text-sm font-black text-[#5D4037]/70 hover:text-[#5D4037]">Ve trang mua sam</a>
        <div class="h-10 w-10 rounded-full bg-[#D19C74] text-white flex items-center justify-center text-xs font-black shadow-sm">AD</div>
    </div>
</header>
</body>
</html>
