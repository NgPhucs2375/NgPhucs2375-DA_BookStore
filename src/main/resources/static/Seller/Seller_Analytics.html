<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOKOM SELLER - Phan tich</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { "brand-peach": "#F8D9C0", "brand-cream": "#FAF5E8", "brand-biscuit": "#D19C74", "brand-dark": "#5D4037", "brand-accent": "#E5CBB5", "brand-orange": "#ea580c" }, fontFamily: { sans: ["Quicksand", "sans-serif"] } } } };
  </script>
</head>
<body class="font-sans bg-[#fbfaf8] text-brand-dark">
  <div class="flex min-h-screen">
    <div id="panel-sidebar"></div>
    <div class="flex-1 min-w-0">
      <div id="panel-header"></div>
      <main class="p-4 md:p-8 space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">Tong gia tri uoc tinh</p><p id="seller-ana-revenue" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">Gia trung binh</p><p id="seller-ana-avg" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">So dau sach</p><p id="seller-ana-count" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-brand-cream p-5"><p class="text-sm font-black text-brand-dark/70">Sap het hang</p><p id="seller-ana-low" class="mt-2 text-2xl md:text-3xl font-black text-brand-orange">--</p></article>
        </section>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
          <article class="rounded-xl border border-brand-accent bg-white p-5"><h2 class="text-lg font-black mb-4">Doanh thu theo danh muc</h2><canvas id="seller-category-chart" height="120"></canvas></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><h2 class="text-lg font-black mb-4">Trang thai don hang</h2><canvas id="seller-order-status-chart" height="120"></canvas></article>
        </section>

        <section class="rounded-xl border border-brand-accent bg-white overflow-hidden">
          <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead class="bg-brand-cream text-brand-dark/70"><tr><th class="px-4 py-3 font-black">Danh muc</th><th class="px-4 py-3 font-black">So sach</th><th class="px-4 py-3 font-black">Gia tri</th></tr></thead><tbody id="seller-analytics-body" class="divide-y divide-brand-accent"></tbody></table></div>
        </section>
      </main>
    </div>
  </div>

  <script src="../Admin/admin-shell.js"></script>
  <script src="../Admin/panel-data.js"></script>
  <script>
    BookomPanelShell.init({ role: "seller", page: "seller-analytics", title: "Phan tich doanh thu", subtitle: "UC-SEL-04 + chart" });
    BookomPanelData.initSellerAnalytics();
  </script>
</body>
</html>
