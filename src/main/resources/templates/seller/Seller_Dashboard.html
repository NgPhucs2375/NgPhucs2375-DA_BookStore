<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/panel_head :: head('BOOKOM SELLER - Tong quan', false)}"></head>
<body class="font-sans bg-[#fbfaf8] text-[#5D4037]">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/seller_layout :: sidebar(${activeMenu})}"></div>
    <div class="flex-1 min-w-0">
        <div th:replace="~{fragments/seller_layout :: header(${pageTitle}, ${pageSubtitle})}"></div>
        <main class="p-4 md:p-8 space-y-6">
            <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
                <article class="rounded-xl border border-[#E5CBB5] bg-white p-5"><p class="text-sm font-black text-[#5D4037]/70">Doanh thu hom nay</p><p id="seller-metric-revenue" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
                <article class="rounded-xl border border-[#E5CBB5] bg-white p-5"><p class="text-sm font-black text-[#5D4037]/70">Don cho xac nhan</p><p id="seller-metric-pending" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
                <article class="rounded-xl border border-[#E5CBB5] bg-white p-5"><p class="text-sm font-black text-[#5D4037]/70">So san pham</p><p id="seller-metric-products" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
                <article class="rounded-xl border border-[#E5CBB5] bg-[#FAF5E8] p-5"><p class="text-sm font-black text-[#5D4037]/70">Sap het hang</p><p id="seller-metric-low" class="mt-2 text-2xl md:text-3xl font-black text-[#ea580c]">--</p></article>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/panel-data.js}"></script>
<script th:src="@{/js/api-service.js}"></script>
<script th:src="@{/js/seller-dashboard-integration.js}"></script>
<script>
// Load seller dashboard with new API integration
if (typeof loadSellerDashboard === 'function') {
    loadSellerDashboard();
} else {
    BookomPanelData.initSellerDashboard();
}
</script>
</body>
</html>
