<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOKOM SELLER - Tong quan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { "brand-peach": "#F8D9C0", "brand-cream": "#FAF5E8", "brand-biscuit": "#D19C74", "brand-dark": "#5D4037", "brand-accent": "#E5CBB5", "brand-orange": "#ea580c" }, fontFamily: { sans: ["Quicksand", "sans-serif"] } } } };
  </script>
</head>
<body class="font-sans bg-[#fbfaf8] text-brand-dark">
  <div class="flex min-h-screen">
    <div id="panel-sidebar"></div>
    <div class="flex-1 min-w-0">
      <div id="panel-header"></div>
      <main class="p-4 md:p-8 space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">Doanh thu hom nay</p><p id="seller-metric-revenue" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">Don cho xac nhan</p><p id="seller-metric-pending" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">So san pham</p><p id="seller-metric-products" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-brand-cream p-5"><p class="text-sm font-black text-brand-dark/70">Sap het hang</p><p id="seller-metric-low" class="mt-2 text-2xl md:text-3xl font-black text-brand-orange">--</p></article>
        </section>

        <section class="rounded-xl border border-brand-accent bg-white overflow-hidden">
          <div class="px-5 py-4 border-b border-brand-accent flex justify-between items-center"><h2 class="text-lg font-black">Don gan day</h2><a href="Seller_Orders.html" class="text-sm font-black text-brand-orange hover:underline">Xem don hang</a></div>
          <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead class="bg-brand-cream text-brand-dark/70"><tr><th class="px-4 py-3 font-black">Ma</th><th class="px-4 py-3 font-black">Khach</th><th class="px-4 py-3 font-black">San pham</th><th class="px-4 py-3 font-black">Tong</th><th class="px-4 py-3 font-black text-right">Trang thai</th></tr></thead><tbody id="seller-dashboard-orders" class="divide-y divide-brand-accent"></tbody></table></div>
        </section>
      </main>
    </div>
  </div>

  <script src="../Admin/admin-shell.js"></script>
  <script src="../Admin/panel-data.js"></script>
  <script>
    BookomPanelShell.init({ role: "seller", page: "seller-dashboard", title: "Tong quan nha ban", subtitle: "UC-SEL-01" });
    BookomPanelData.initSellerDashboard();
  </script>
</body>
</html>
