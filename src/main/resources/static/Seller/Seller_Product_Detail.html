<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKOM - Chi tiết Sản Phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-brown': '#cda27a',
                        'brand-dark': '#4a3b32',
                        'brand-bg': '#f1f5f9',
                        'brand-orange': '#ea580c',
                        'brand-border': '#e2e8f0',
                    },
                    fontFamily: { sans: ['Quicksand', 'sans-serif'] },
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg font-sans text-brand-dark flex h-screen overflow-hidden">

<main class="flex-1 flex flex-col h-full overflow-hidden">
    <header class="h-20 bg-white border-b border-brand-border flex items-center justify-between px-8 z-10 shadow-sm sticky top-0">
        <div class="flex items-center gap-4">
            <a href="Inventory_Management.html" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <div>
                <h1 class="text-xl font-black">Chỉnh sửa sách</h1>
                <p class="text-xs font-bold text-slate-400">SKU: BK-PSY-001</p>
            </div>
        </div>
        <div class="flex gap-3">
            <a href="Inventory_Management.html" class="px-6 py-2.5 bg-white border border-brand-border text-slate-600 font-bold rounded-lg shadow-sm hover:bg-slate-50 transition">Hủy bỏ</a>
            <button class="px-6 py-2.5 bg-brand-orange text-white font-bold rounded-lg shadow-md hover:bg-orange-700 transition hover:scale-105 active:scale-95">Lưu thay đổi</button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/3 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-brand-border shadow-sm">
                    <h3 class="font-black text-sm uppercase tracking-widest text-slate-500 mb-4">Hình ảnh sản phẩm</h3>
                    
                    <div class="aspect-[3/4] w-full bg-slate-100 border-2 border-dashed border-brand-brown rounded-xl flex flex-col items-center justify-center text-slate-400 cursor-pointer hover:bg-slate-50 hover:border-brand-orange transition group relative overflow-hidden">
                        <div class="absolute inset-0 bg-slate-800 flex items-center justify-center text-white font-black opacity-100 group-hover:opacity-50 transition">
                            ẢNH BÌA SÁCH
                        </div>
                        <div class="z-10 flex flex-col items-center opacity-0 group-hover:opacity-100 transition">
                            <svg class="w-8 h-8 mb-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            <span class="text-sm font-bold text-white">Đổi ảnh bìa</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3 mt-4">
                        <div class="aspect-square bg-slate-200 rounded-lg cursor-pointer border border-transparent hover:border-brand-orange transition"></div>
                        <div class="aspect-square bg-slate-200 rounded-lg cursor-pointer border border-transparent hover:border-brand-orange transition"></div>
                        <div class="aspect-square bg-slate-50 border border-dashed border-slate-300 rounded-lg flex items-center justify-center text-slate-400 cursor-pointer hover:border-brand-orange hover:text-brand-orange transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-2/3 space-y-6">
                <div class="bg-white p-8 rounded-2xl border border-brand-border shadow-sm">
                    <h3 class="font-black text-sm uppercase tracking-widest text-slate-500 mb-6 border-b pb-4">Thông tin cơ bản</h3>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Tên sách <span class="text-red-500">*</span></label>
                            <input type="text" value="Tâm Lý Học Đám Đông" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-brand-orange font-bold text-brand-dark bg-slate-50 focus:bg-white transition">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-black uppercase text-slate-500 mb-2">Mã SKU</label>
                                <input type="text" value="BK-PSY-001" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-brand-orange font-bold text-slate-500 bg-slate-50">
                            </div>
                            <div>
                                <label class="block text-xs font-black uppercase text-slate-500 mb-2">Danh mục</label>
                                <select class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-brand-orange font-bold text-brand-dark bg-slate-50 focus:bg-white transition">
                                    <option>Kỹ năng sống</option>
                                    <option>Sách Văn học</option>
                                    <option>Công nghệ IT</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Mô tả sách</label>
                            <div class="border border-slate-200 rounded-lg overflow-hidden">
                                <div class="bg-slate-50 border-b border-slate-200 px-4 py-2 flex gap-3 text-slate-500">
                                    <button class="font-black hover:text-brand-dark">B</button>
                                    <button class="italic hover:text-brand-dark">I</button>
                                    <button class="underline hover:text-brand-dark">U</button>
                                </div>
                                <textarea class="w-full px-4 py-3 outline-none focus:bg-white bg-slate-50 transition h-32 font-medium text-sm text-slate-600 leading-relaxed">Tâm lý học đám đông là một tác phẩm kinh điển của Gustave Le Bon...</textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl border border-brand-border shadow-sm">
                    <h3 class="font-black text-sm uppercase tracking-widest text-slate-500 mb-6 border-b pb-4">Định giá & Tồn kho</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Giá bìa (VNĐ)</label>
                            <input type="number" value="120000" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-brand-orange font-bold text-brand-dark bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Giá bán thực (VNĐ)</label>
                            <input type="number" value="85000" class="w-full px-4 py-3 rounded-lg border border-brand-orange outline-none font-black text-brand-orange bg-orange-50/30">
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Số lượng tồn</label>
                            <input type="number" value="120" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-brand-orange font-black text-brand-dark bg-slate-50">
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</main>

</body>
</html>
