<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/panel_head :: head('BOOKOM ADMIN - Gian hang', false)}"></head>
<body class="font-sans bg-[#fbfaf8] text-[#5D4037]">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin_layout :: sidebar(${activeMenu})}"></div>
    <div class="flex-1 min-w-0">
        <div th:replace="~{fragments/admin_layout :: header(${pageTitle}, ${pageSubtitle})}"></div>
        <main class="p-4 md:p-8 space-y-6">
            <section class="rounded-xl border border-[#E5CBB5] bg-white p-4">
                <input id="shops-q" class="w-full rounded-lg border border-[#E5CBB5] px-3 py-2 font-bold" placeholder="Tim ten shop/chu shop/MST">
            </section>
            <section class="rounded-xl border border-[#E5CBB5] bg-white overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-[#FAF5E8] text-[#5D4037]/70"><tr><th class="px-4 py-3 font-black">Ten shop</th><th class="px-4 py-3 font-black">Chu shop</th><th class="px-4 py-3 font-black">Ho so</th><th class="px-4 py-3 font-black">So san pham</th><th class="px-4 py-3 font-black">Ngay tao</th><th class="px-4 py-3 font-black text-right">Xu ly</th></tr></thead>
                        <tbody id="admin-shops-body" class="divide-y divide-[#E5CBB5]"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/panel-data.js}"></script>
<script>BookomPanelData.initAdminShops();</script>
</body>
</html>
