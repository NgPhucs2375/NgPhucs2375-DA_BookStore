<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOKOM ADMIN - Tong quan san</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { "brand-peach": "#F8D9C0", "brand-cream": "#FAF5E8", "brand-biscuit": "#D19C74", "brand-dark": "#5D4037", "brand-accent": "#E5CBB5", "brand-orange": "#ea580c" }, fontFamily: { sans: ["Quicksand", "sans-serif"] } } } };
  </script>
</head>
<body class="font-sans bg-[#fbfaf8] text-brand-dark">
  <div class="flex min-h-screen">
    <div id="panel-sidebar"></div>
    <div class="flex-1 min-w-0">
      <div id="panel-header"></div>
      <main class="p-4 md:p-8 space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">GMV toan san</p><p id="metric-gmv" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">So sach hien co</p><p id="metric-books" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-white p-5"><p class="text-sm font-black text-brand-dark/70">Danh muc</p><p id="metric-categories" class="mt-2 text-2xl md:text-3xl font-black">--</p></article>
          <article class="rounded-xl border border-brand-accent bg-brand-cream p-5"><p class="text-sm font-black text-brand-dark/70">Gian hang</p><p id="metric-shops" class="mt-2 text-2xl md:text-3xl font-black text-brand-orange">--</p></article>
        </section>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
          <article class="rounded-xl border border-brand-accent bg-white p-5">
            <h2 class="text-lg font-black mb-4">Phan bo danh muc sach</h2>
            <canvas id="admin-category-chart" height="120"></canvas>
          </article>
          <article class="rounded-xl border border-brand-accent bg-white p-5">
            <h2 class="text-lg font-black mb-4">Tinh trang ton kho</h2>
            <canvas id="admin-stock-chart" height="120"></canvas>
          </article>
        </section>

        <section class="rounded-xl border border-brand-accent bg-white overflow-hidden">
          <div class="px-5 py-4 border-b border-brand-accent flex items-center justify-between">
            <h2 class="text-lg font-black">Shop duoc map tu du lieu sach</h2>
            <a href="Admin_Shops.html" class="text-sm font-black text-brand-orange hover:underline">Xem trang shops</a>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-brand-cream text-brand-dark/70"><tr><th class="px-4 py-3 font-black">Ten shop</th><th class="px-4 py-3 font-black">Ho so</th><th class="px-4 py-3 font-black">Ngay tao</th><th class="px-4 py-3 font-black text-right">Trang thai</th></tr></thead>
              <tbody id="admin-dashboard-shops" class="divide-y divide-brand-accent"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="admin-shell.js"></script>
  <script src="panel-data.js"></script>
  <script>
    BookomPanelShell.init({ role: "admin", page: "admin-dashboard", title: "Tong quan san", subtitle: "UC-ADM-01, UC-ADM-05" });
    BookomPanelData.initAdminDashboard();
  </script>
</body>
</html>
