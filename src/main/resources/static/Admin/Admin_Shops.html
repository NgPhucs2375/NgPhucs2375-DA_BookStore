<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOKOM ADMIN - Gian hang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { "brand-peach": "#F8D9C0", "brand-cream": "#FAF5E8", "brand-biscuit": "#D19C74", "brand-dark": "#5D4037", "brand-accent": "#E5CBB5", "brand-orange": "#ea580c" }, fontFamily: { sans: ["Quicksand", "sans-serif"] } } } };
  </script>
</head>
<body class="font-sans bg-[#fbfaf8] text-brand-dark">
  <div class="flex min-h-screen">
    <div id="panel-sidebar"></div>
    <div class="flex-1 min-w-0">
      <div id="panel-header"></div>
      <main class="p-4 md:p-8 space-y-6">
        <section class="rounded-xl border border-brand-accent bg-white p-4">
          <input id="shops-q" class="w-full rounded-lg border border-brand-accent px-3 py-2 font-bold" placeholder="Tim ten shop/chu shop/MST">
        </section>

        <section class="rounded-xl border border-brand-accent bg-white overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-brand-cream text-brand-dark/70"><tr><th class="px-4 py-3 font-black">Ten shop</th><th class="px-4 py-3 font-black">Chu shop</th><th class="px-4 py-3 font-black">Ho so</th><th class="px-4 py-3 font-black">So san pham</th><th class="px-4 py-3 font-black">Ngay tao</th><th class="px-4 py-3 font-black text-right">Xu ly</th></tr></thead>
              <tbody id="admin-shops-body" class="divide-y divide-brand-accent"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="admin-shell.js"></script>
  <script src="panel-data.js"></script>
  <script>
    BookomPanelShell.init({ role: "admin", page: "admin-shops", title: "Xet duyet gian hang", subtitle: "UC-ADM-04 + tim kiem" });
    BookomPanelData.initAdminShops();
  </script>
</body>
</html>
